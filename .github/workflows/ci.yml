name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: veriscope
          POSTGRES_PASSWORD: veriscope
          POSTGRES_DB: veriscope_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U veriscope -d veriscope_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://veriscope:veriscope@localhost:5432/veriscope_test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: pytest

  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m scripts.package_extension
      - run: docker build --tag veriscope:ci .
      - uses: actions/upload-artifact@v7
        with:
          name: veriscope-extension
          path: dist/veriscope-extension-*.zip
          if-no-files-found: error
